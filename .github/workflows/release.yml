name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            name: windows-x64
          - os: ubuntu-latest
            rid: linux-x64
            name: linux-x64
          - os: macos-13
            rid: osx-x64
            name: macos-x64
          - os: macos-latest
            rid: osx-arm64
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Determine version
        id: version
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == v* ]]; then
            echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: >
          dotnet publish HardwareMonitor.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -p:Version=${{ steps.version.outputs.version }}
          -o dist

      # ── Portable ──────────────────────────────────────
      - name: Package portable (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\* -DestinationPath HardwareMonitor-${{ matrix.name }}-portable.zip

      - name: Package portable (Unix)
        if: runner.os != 'Windows'
        run: tar -czf HardwareMonitor-${{ matrix.name }}-portable.tar.gz -C dist .

      # ── Setup: Windows (Inno Setup) ──────────────────
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss "/DMyAppVersion=${{ steps.version.outputs.version }}"

      # ── Setup: Linux (.deb) ──────────────────────────
      - name: Build Linux deb package
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p pkg/DEBIAN pkg/opt/hardware-monitor pkg/usr/share/applications

          cp -r dist/* pkg/opt/hardware-monitor/
          chmod +x pkg/opt/hardware-monitor/HardwareMonitor

          cat > pkg/DEBIAN/control << 'CTRL'
          Package: hardware-monitor
          Version: VERSIONPLACEHOLDER
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libicu-dev
          Maintainer: MadLongTom
          Description: Hardware Monitor
           Cross-platform hardware monitoring application built with Avalonia UI.
          CTRL
          sed -i 's/^          //' pkg/DEBIAN/control
          sed -i "s/VERSIONPLACEHOLDER/${VERSION}/" pkg/DEBIAN/control

          cat > pkg/usr/share/applications/hardware-monitor.desktop << 'DESK'
          [Desktop Entry]
          Name=Hardware Monitor
          Comment=System hardware monitoring tool
          Exec=/opt/hardware-monitor/HardwareMonitor
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          DESK
          sed -i 's/^          //' pkg/usr/share/applications/hardware-monitor.desktop

          dpkg-deb --build pkg "HardwareMonitor-${{ matrix.name }}-setup.deb"

      # ── Setup: macOS (.dmg) ──────────────────────────
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP="HardwareMonitor.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp -r dist/* "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/HardwareMonitor"

          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Hardware Monitor</string>
            <key>CFBundleExecutable</key>
            <string>HardwareMonitor</string>
            <key>CFBundleIdentifier</key>
            <string>com.madlongtom.hardwaremonitor</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          sed -i '' 's/^          //' "$APP/Contents/Info.plist"

          brew install create-dmg || true
          create-dmg \
            --volname "HardwareMonitor" \
            --window-size 600 400 \
            --icon "HardwareMonitor.app" 150 200 \
            --app-drop-link 450 200 \
            "HardwareMonitor-${{ matrix.name }}-setup.dmg" \
            "$APP" || true

      # ── Upload ───────────────────────────────────────
      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.name }}
          path: |
            *.zip
            *.tar.gz

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: setup-${{ matrix.name }}
          path: |
            *-setup*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List release files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
            *-setup*
          generate_release_notes: true
