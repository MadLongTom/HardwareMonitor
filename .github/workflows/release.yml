name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            name: windows-x64
          - os: ubuntu-latest
            rid: linux-x64
            name: linux-x64
          - os: macos-13
            rid: osx-x64
            name: macos-x64
          - os: macos-latest
            rid: osx-arm64
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone LibreHardwareMonitor
        run: git clone --depth 1 -b fix/nct6687d-fan-curve-write https://github.com/MadLongTom/LibreHardwareMonitor.git ../LibreHardwareMonitor

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish HardwareMonitor.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o dist

      # ── Portable ──────────────────────────────────────
      - name: Package portable (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\* -DestinationPath HardwareMonitor-${{ matrix.name }}-portable.zip

      - name: Package portable (Unix)
        if: runner.os != 'Windows'
        run: tar -czf HardwareMonitor-${{ matrix.name }}-portable.tar.gz -C dist .

      # ── Setup: Windows (Inno Setup) ──────────────────
      - name: Build Windows installer
        if: runner.os == 'Windows'
        run: |
          choco install innosetup -y --no-progress
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss /DMyAppVersion=$version
        shell: pwsh

      # ── Setup: Linux (.deb) ──────────────────────────
      - name: Build Linux deb package
        if: runner.os == 'Linux'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/opt/hardware-monitor
          mkdir -p pkg/usr/share/applications

          cp -r dist/* pkg/opt/hardware-monitor/
          chmod +x pkg/opt/hardware-monitor/HardwareMonitor

          cat > pkg/DEBIAN/control <<EOF
          Package: hardware-monitor
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libicu-dev
          Maintainer: MadLongTom
          Description: Hardware Monitor
           Cross-platform hardware monitoring application built with Avalonia UI.
          EOF
          # remove leading spaces added by heredoc indentation
          sed -i 's/^          //' pkg/DEBIAN/control

          cat > pkg/usr/share/applications/hardware-monitor.desktop <<EOF
          [Desktop Entry]
          Name=Hardware Monitor
          Comment=System hardware monitoring tool
          Exec=/opt/hardware-monitor/HardwareMonitor
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          EOF
          sed -i 's/^          //' pkg/usr/share/applications/hardware-monitor.desktop

          dpkg-deb --build pkg "HardwareMonitor-${{ matrix.name }}-setup.deb"

      # ── Setup: macOS (.dmg) ──────────────────────────
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="HardwareMonitor.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp -r dist/* "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/HardwareMonitor"

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Hardware Monitor</string>
            <key>CFBundleExecutable</key>
            <string>HardwareMonitor</string>
            <key>CFBundleIdentifier</key>
            <string>com.madlongtom.hardwaremonitor</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          sed -i '' 's/^          //' "$APP/Contents/Info.plist"

          brew install create-dmg
          create-dmg \
            --volname "HardwareMonitor" \
            --window-size 600 400 \
            --icon "HardwareMonitor.app" 150 200 \
            --app-drop-link 450 200 \
            "HardwareMonitor-${{ matrix.name }}-setup.dmg" \
            "$APP" || true  # create-dmg returns 2 on success without code-sign

      # ── Upload ───────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            *.zip
            *.tar.gz
            *.exe
            *.deb
            *.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
            *.exe
            *.deb
            *.dmg
          generate_release_notes: true
