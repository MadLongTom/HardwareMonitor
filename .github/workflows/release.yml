name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,  rid: win-x64,     platform: windows-x64,  innoArch: x64compatible }
          - { os: windows-latest,  rid: win-arm64,    platform: windows-arm64, innoArch: arm64 }
          - { os: macos-latest,    rid: osx-arm64,    platform: macos-arm64 }
          - { os: ubuntu-24.04,    rid: linux-x64,    platform: linux-x64,    debArch: amd64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, platform: linux-arm64,  debArch: arm64 }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          # Change to 'preview' if .NET 10 is not yet GA
          dotnet-quality: 'ga'

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      # ═══════════════════════════════════════════════════
      #  Publish — 3 modes
      # ═══════════════════════════════════════════════════

      - name: Publish — NativeAOT
        run: >
          dotnet publish HardwareMonitor.csproj -c Release
          -r ${{ matrix.rid }}
          -p:PublishAot=true
          -p:DebugType=none
          -p:Version=${{ steps.ver.outputs.v }}
          -o dist/nativeaot

      - name: Publish — Runtime (self-contained)
        run: >
          dotnet publish HardwareMonitor.csproj -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -p:Version=${{ steps.ver.outputs.v }}
          -o dist/runtime

      - name: Publish — Portable (framework-dependent)
        run: >
          dotnet publish HardwareMonitor.csproj -c Release
          -r ${{ matrix.rid }}
          --no-self-contained
          -p:PublishAot=false
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:Version=${{ steps.ver.outputs.v }}
          -o dist/portable

      - name: Remove XML docs from dist
        shell: bash
        run: find dist -name '*.xml' -delete 2>/dev/null || true

      # ═══════════════════════════════════════════════════
      #  Archives — nativeaot-portable & runtime-portable
      # ═══════════════════════════════════════════════════

      - name: Archive portables (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\nativeaot\* -DestinationPath "HardwareMonitor-${{ matrix.platform }}-nativeaot-portable.zip"
          Compress-Archive -Path dist\runtime\*   -DestinationPath "HardwareMonitor-${{ matrix.platform }}-runtime-portable.zip"

      - name: Archive portables (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf "HardwareMonitor-${{ matrix.platform }}-nativeaot-portable.tar.gz" -C dist/nativeaot .
          tar -czf "HardwareMonitor-${{ matrix.platform }}-runtime-portable.tar.gz"   -C dist/runtime .

      # ═══════════════════════════════════════════════════
      #  Windows installers (Inno Setup)
      # ═══════════════════════════════════════════════════

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup -y --no-progress

      - name: Build Windows runtime installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          "/DMyAppVersion=${{ steps.ver.outputs.v }}"
          "/DDistDir=dist\runtime"
          "/DOutputName=HardwareMonitor-${{ matrix.platform }}-runtime-setup"
          "/DArchAllowed=${{ matrix.innoArch }}"

      - name: Build Windows portable installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          "/DMyAppVersion=${{ steps.ver.outputs.v }}"
          "/DDistDir=dist\portable"
          "/DOutputName=HardwareMonitor-${{ matrix.platform }}-portable-setup"
          "/DArchAllowed=${{ matrix.innoArch }}"

      # ═══════════════════════════════════════════════════
      #  Linux installers (.deb)
      # ═══════════════════════════════════════════════════

      - name: Build Linux deb packages
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.debArch }}"

          for MODE in runtime portable; do
            PKG="pkg-${MODE}"
            mkdir -p "${PKG}/DEBIAN" "${PKG}/opt/hardware-monitor" "${PKG}/usr/share/applications"
            cp -r "dist/${MODE}"/* "${PKG}/opt/hardware-monitor/"
            chmod +x "${PKG}/opt/hardware-monitor/HardwareMonitor"

            DEPS=""
            DESC="Cross-platform hardware monitoring application. Includes .NET runtime."
            SUFFIX="runtime-setup"
            if [ "${MODE}" = "portable" ]; then
              DEPS="dotnet-runtime-10.0"
              DESC="Cross-platform hardware monitoring application. Requires .NET 10 runtime."
              SUFFIX="portable-setup"
            fi

            {
              echo "Package: hardware-monitor"
              echo "Version: ${VERSION}"
              echo "Section: utils"
              echo "Priority: optional"
              echo "Architecture: ${ARCH}"
              [ -n "${DEPS}" ] && echo "Depends: ${DEPS}"
              echo "Maintainer: MadLongTom"
              echo "Description: Hardware Monitor (${MODE})"
              echo " ${DESC}"
            } > "${PKG}/DEBIAN/control"

            {
              echo "[Desktop Entry]"
              echo "Name=Hardware Monitor"
              echo "Comment=System hardware monitoring tool"
              echo "Exec=/opt/hardware-monitor/HardwareMonitor"
              echo "Terminal=false"
              echo "Type=Application"
              echo "Categories=System;Monitor;"
            } > "${PKG}/usr/share/applications/hardware-monitor.desktop"

            dpkg-deb --build "${PKG}" "HardwareMonitor-${PLATFORM}-${SUFFIX}.deb"
          done

      # ═══════════════════════════════════════════════════
      #  macOS installers (.dmg)
      # ═══════════════════════════════════════════════════

      - name: Build macOS DMG packages
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          PLATFORM="${{ matrix.platform }}"
          brew install create-dmg || true

          for MODE in runtime portable; do
            SUFFIX="${MODE}-setup"
            [ "${MODE}" = "portable" ] && SUFFIX="portable-setup"

            WORK="build-${MODE}"
            APP="${WORK}/HardwareMonitor.app"
            mkdir -p "${APP}/Contents/MacOS" "${APP}/Contents/Resources"
            cp -r "dist/${MODE}"/* "${APP}/Contents/MacOS/"
            chmod +x "${APP}/Contents/MacOS/HardwareMonitor"

            cat > "${APP}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleName</key>
              <string>Hardware Monitor</string>
              <key>CFBundleExecutable</key>
              <string>HardwareMonitor</string>
              <key>CFBundleIdentifier</key>
              <string>com.madlongtom.hardwaremonitor</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
            </dict>
          </plist>
          PLIST

            create-dmg \
              --volname "HardwareMonitor" \
              --window-size 600 400 \
              --icon "HardwareMonitor.app" 150 200 \
              --app-drop-link 450 200 \
              "HardwareMonitor-${PLATFORM}-${SUFFIX}.dmg" \
              "${WORK}/" || true
          done

      # ═══════════════════════════════════════════════════
      #  Upload
      # ═══════════════════════════════════════════════════

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: HardwareMonitor-${{ matrix.platform }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List release files
        run: ls -lh HardwareMonitor-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: HardwareMonitor-*
          generate_release_notes: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
            *-setup*
          generate_release_notes: true
